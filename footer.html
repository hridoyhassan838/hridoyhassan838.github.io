<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footer Section - Hridoy Picks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <style>
    /* ====== Footer CSS ====== */
    body {
      margin: 0;
      padding: 0;
      background: #222;
      font-family: 'Poppins', sans-serif;
      color: #eee;
    }

    .site-footer {
      background-color: #111;
      color: #eee;
      padding: 40px 20px;
    }

    .footer-container {
      max-width: 1100px;
      margin: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .footer-column {
      flex: 1;
      min-width: 220px;
      margin-bottom: 20px;
    }

    .footer-column h3 {
      margin-bottom: 15px;
      color: #fff;
      font-weight: 600;
    }

    .footer-column ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .footer-column ul li {
      margin-bottom: 10px;
    }

    .footer-column ul li a {
      color: #ccc;
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-column ul li a:hover {
      color: #00eaff;
    }

    .social-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      margin-right: 12px;
      color: #fff;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .social-icons a:hover {
      transform: scale(1.1);
    }

    .social-icons .facebook {
      background-color: #1877f2;
    }

    .social-icons .instagram {
      background: radial-gradient(circle at 30% 30%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
    }

    .social-icons .tiktok {
      background-color: #010101;
    }

    hr {
      border: 0;
      height: 1px;
      background: #333;
      margin: 30px 0 20px;
    }

    .footer-bottom {
      text-align: center;
      font-size: 14px;
      margin-top: 20px;
      color: #999;
    }

    .footer-links {
      text-align: center;
      font-size: 13px;
      margin-top: 8px;
    }

    .footer-links a {
      color: lightgray;
      margin: 0 6px;
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-links a:hover {
      color: #00eaff;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .footer-container {
        flex-direction: column;
        align-items: center;
      }
      .footer-column {
        min-width: 100%;
        margin-bottom: 30px;
      }
      .social-icons a {
        margin-right: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ==============================
       Footer Section Starts Here

          <li><a href="disclaimer.html">Disclaimer</a></li>
          <li><a href="faq.html">FAQ</a></li>
        </ul>
      </div>

      <!-- Contact Column -->
      <div class="footer-column">
        <h3>Contact</h3>
        <ul>
          <li><a href="send-feedback.html">Send Feedback</a></li>
          <li><a href="mailto:freelancerbd838@gmail.com">Email Us</a></li>
          <li><a href="contact.html">Contact Me</a></li>
        </ul>
      </div>

      <!-- Social Media Column -->
      <div class="footer-column">
        <h3>Follow Us</h3>
        <div class="social-icons">
          <a href="https://www.facebook.com/share/16frumkbMB/" target="_blank" class="facebook" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="https://instagram.com" target="_blank" class="instagram" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a href="https://tiktok.com" target="_blank" class="tiktok" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
      </div>

    </div> <!-- End of .footer-container -->

    <!-- Horizontal Line Divider -->
    <hr />

    <!-- Footer Bottom Text -->

    <!-- Footer Legal Links -->

       Footer Section Ends Here

</body>
</html>
