<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Header Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }header {
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.left-icons, .right-icons {
  display: flex;
  align-items: center;
  gap: 15px;
}

.icon-search, .icon-hamburger, .icon-user {
  font-size: 20px;
  color: #ffffff;
  cursor: pointer;
}

.logo {
  display: flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.3em;
  color: #ffffff;
}

.logo img {
  height: 60px;
}

.search-box {
  position: relative;
  display: none;
  align-items: center;
}

.search-box input {
  padding: 6px 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

.clear-icon {
  position: absolute;
  right: 10px;
  font-size: 18px;
  cursor: pointer;
  color: #888;
  display: none;
}

#drawerMenu {
  position: fixed;
  top: 0;
  right: -270px;
  width: 270px;
  height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
  transition: right 0.3s ease;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  padding: 35px 25px;
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
}

#drawerMenu span {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 26px;
  font-weight: bold;
  color: #ffffff;
  cursor: pointer;
}

#drawerMenu h2 {
  margin-bottom: 30px;
  font-size: 22px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 1px;
}

#drawerMenu a {
  margin-bottom: 18px;
  font-size: 16px;
  color: #ffffff;
  text-decoration: none;
  transition: 0.2s;
}

#drawerMenu a:hover {
  color: #00eaff;
  padding-left: 5px;
  transition: all 0.3s ease;
}

.hide {
  display: none !important;
}

  </style>
</head>
<body>  <header>
    <div class="left-icons">
      <i class="fas fa-bars icon-hamburger" onclick="toggleDrawer()"></i>
    </div><a href="#" class="logo" id="logoBox">
  <span>Hridoy</span>
  <img src="logo-img/hp.webp" alt="Logo" />
  <span>Picks</span>
</a>

<div class="search-box" id="searchBox">
  <input id="searchInput" type="text" placeholder="Search here..." />
  <span id="clearBtn" class="clear-icon" onclick="clearSearch()">×</span>
</div>

<div class="right-icons">
  <i class="fas fa-search icon-search" onclick="toggleSearch()"></i>
  <a href="contact.html" class="icon-link">
    <i class="fas fa-user icon-user"></i>
  </a>
</div>

  </header>  <div id="drawerMenu">
    <span onclick="toggleDrawer()">&times;</span>
    <h2>Menu</h2>
    <a href="index.html">Home</a>
    <a href="menu1.html">1. Here are 10 popular Home & Kitchen products.</a>
  </div>  
  
  

  <!-- হেডারে সার্চ আইকন চাপলে, লোগো লুকিয়ে ফেলে এবং সার্চ বক্স দেখায়। আবার চাপলে উল্টোটা -->
<script>
function toggleSearch() {
  const logo = document.getElementById("logoBox");
  const searchBox = document.getElementById("searchBox");
  if (searchBox && logo) {
    const isHidden = searchBox.style.display === "none" || searchBox.style.display === "";
    logo.style.display = isHidden ? "none" : "flex";
    searchBox.style.display = isHidden ? "flex" : "none";
  }
}
</script>

<!-- যদি সার্চ ইনপুটে কিছু টাইপ করা হয়, তাহলে × (clear) বাটন দেখা যাবে -->
<script>
function toggleClearIcon() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearBtn");
  if (input && clearBtn) {
    clearBtn.style.display = input.value.length > 0 ? "inline" : "none";
  }
}
</script>

<!-- × বাটনে ক্লিক করলে ইনপুট ফাঁকা হয় এবং সব প্রোডাক্ট (কার্ড) আবার দেখা যায় -->
<script>
function clearSearch() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearBtn");
  const cards = document.querySelectorAll(".product-card");
  if (input && clearBtn) {
    input.value = "";
    clearBtn.style.display = "none";
    input.focus();
  }
  cards.forEach(card => {
    card.classList.remove("hide");
  });
}
</script>

<!-- হ্যামবার্গার আইকনে ক্লিক করলে ড্রয়ার স্লাইড করে বের হয়, আবার চাপলে লুকায় -->
<script>
function toggleDrawer() {
  const drawer = document.getElementById("drawerMenu");
  if (drawer) {
    drawer.style.right = drawer.style.right === "0px" ? "-270px" : "0px";
  }
}
</script>

<!-- নিচের সবকিছু DOM লোড হওয়ার পর চালু হবে -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  // বর্তমান পেজের নাম বের করা
  const pageName = window.location.pathname.split("/").pop() || "home";
  const scrollKey = "scrollPos_" + pageName;

  // আগের স্ক্রল পজিশন রিস্টোর
  const savedScrollPos = sessionStorage.getItem(scrollKey);
  if (savedScrollPos) {
    setTimeout(() => {
      window.scrollTo(0, parseInt(savedScrollPos));
      sessionStorage.removeItem(scrollKey);
    }, 100);
  }

  // নতুন পেজে যাওয়ার আগে স্ক্রল পজিশন সেভ
  document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", () => {
      sessionStorage.setItem(scrollKey, window.scrollY);
    });
  });

  // লাইভ সার্চ ইনপুট
  const input = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearBtn");
  const cards = document.querySelectorAll(".product-card");

  if (input) {
    input.addEventListener("input", toggleClearIcon);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        const query = input.value.trim().toLowerCase();
        if (clearBtn) {
          clearBtn.style.display = query ? "inline" : "none";
        }
        cards.forEach(card => {
          const title = card.getAttribute("data-title") || "";
          const match = title.toLowerCase().includes(query);
          card.classList.toggle("hide", !match);
        });
      }
    });
  }

  // নির্দিষ্ট কিছু প্রোডাক্ট পেজে সার্চ বক্স ও সার্চ আইকন লুকানো
  const pagesToHideSearch = [
    "product1.html", "product2.html", "product3.html", "product4.html", "product5.html",
    "product6.html", "product7.html", "product8.html", "product9.html", "product10.html"
  ];
  if (pagesToHideSearch.includes(pageName)) {
    const searchBox = document.getElementById("searchBox");
    const searchIcon = document.querySelector(".icon-search");
    if (searchBox) searchBox.style.display = "none";
    if (searchIcon) searchIcon.style.display = "none";
  }
});
</script>
</body>
</html>
