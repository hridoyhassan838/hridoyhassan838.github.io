<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #333;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .contact-container {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    h2 {
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1em;
    }
    button {
      margin-top: 20px;
      padding: 12px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      border: none;
      color: white;
      font-size: 1em;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background: linear-gradient(to right, #00f2fe, #4facfe);
    }
    footer {
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
      margin-top: 50px;
    }
    @media (max-width: 600px) {
      .contact-container {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact Us</h1>
  </header>

  <div class="contact-container">
    <h2>We'd love to hear from you</h2>
    <form action="https://formspree.io/f/xgvkagnw" method="POST">
      <label for="name">Your Name</label>
      <input type="text" name="name" id="name" placeholder="Enter your name" required>

      <label for="email">Your Email</label>
      <input type="email" name="email" id="email" placeholder="Enter your email" required>

      <label for="message">Message</label>
      <textarea name="message" id="message" rows="5" placeholder="Write your message here..." required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    <p>&copy; 2025 hridoyhassan838 — All Rights Reserved</p>
  </footer>

</body>
</html>
